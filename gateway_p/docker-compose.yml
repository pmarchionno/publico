version: '3'

services:
  api:
    build: .
    command: sh -c "alembic -c alembic.ini upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ./certs:/app/certs:ro  # Certificados SSL (read-only)
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/pagoflex
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  scheduler:
    build: .
    command: sh -c "alembic -c alembic.ini upgrade head && celery -A app.scheduler.worker worker --loglevel=info"
    volumes:
      - .:/app
      - ./certs:/app/certs:ro  # Certificados SSL (read-only)
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/pagoflex
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=pagoflex
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pagoflex"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
